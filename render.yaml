services:
  - type: web
    name: attendance-tracker
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    disk:
      name: data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
